<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Image Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; background: #0c0a06; overflow: hidden; font-family: 'Georgia', serif; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1c1408"/>
      <stop offset="100%" stop-color="#0c0a06"/>
    </radialGradient>
    <!-- Amber glow -->
    <radialGradient id="glowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a832" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e8a832" stop-opacity="0"/>
    </radialGradient>
    <!-- Teal glow -->
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2abfb3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2abfb3" stop-opacity="0"/>
    </radialGradient>
    <!-- Noise filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic"/>
    </filter>
    <clipPath id="clip"><rect width="1200" height="630"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <!-- BG -->
    <rect width="1200" height="630" fill="url(#bgGrad)"/>
    <!-- Grid lines -->
    <g stroke="rgba(232,168,50,0.04)" stroke-width="1">
      <line x1="0" y1="80" x2="1200" y2="80"/>
      <line x1="0" y1="160" x2="1200" y2="160"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="320" x2="1200" y2="320"/>
      <line x1="0" y1="400" x2="1200" y2="400"/>
      <line x1="0" y1="480" x2="1200" y2="480"/>
      <line x1="0" y1="560" x2="1200" y2="560"/>
      <line x1="80" y1="0" x2="80" y2="630"/>
      <line x1="160" y1="0" x2="160" y2="630"/>
      <line x1="240" y1="0" x2="240" y2="630"/>
      <line x1="320" y1="0" x2="320" y2="630"/>
      <line x1="400" y1="0" x2="400" y2="630"/>
      <line x1="480" y1="0" x2="480" y2="630"/>
      <line x1="560" y1="0" x2="560" y2="630"/>
      <line x1="640" y1="0" x2="640" y2="630"/>
      <line x1="720" y1="0" x2="720" y2="630"/>
      <line x1="800" y1="0" x2="800" y2="630"/>
      <line x1="880" y1="0" x2="880" y2="630"/>
      <line x1="960" y1="0" x2="960" y2="630"/>
      <line x1="1040" y1="0" x2="1040" y2="630"/>
      <line x1="1120" y1="0" x2="1120" y2="630"/>
    </g>
    <!-- Amber glow orb -->
    <ellipse cx="200" cy="315" rx="400" ry="400" fill="url(#glowAmber)"/>
    <!-- Teal glow orb -->
    <ellipse cx="1000" cy="200" rx="320" ry="320" fill="url(#glowTeal)"/>
    <!-- Left stripe -->
    <rect x="0" y="0" width="4" height="630" fill="#e8a832" opacity="0.8"/>
    <!-- Right accent bar -->
    <rect x="1196" y="0" width="4" height="630" fill="rgba(42,191,179,0.4)"/>
    <!-- Top bar -->
    <rect x="0" y="0" width="1200" height="1" fill="rgba(232,168,50,0.3)"/>
    <!-- Bottom bar -->
    <rect x="0" y="629" width="1200" height="1" fill="rgba(232,168,50,0.15)"/>

    <!-- Corner bracket TL -->
    <path d="M 60 40 L 40 40 L 40 60" stroke="#e8a832" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Corner bracket BR -->
    <path d="M 1140 590 L 1160 590 L 1160 570" stroke="rgba(42,191,179,0.6)" stroke-width="2" fill="none"/>

    <!-- TAG / eyebrow -->
    <rect x="60" y="100" width="220" height="24" rx="2" fill="rgba(232,168,50,0.08)" stroke="rgba(232,168,50,0.25)" stroke-width="1"/>
    <text x="74" y="116" font-family="'DM Mono', monospace" font-size="11" letter-spacing="3" fill="#e8a832" opacity="0.9">PORTFOLIO · 2025</text>

    <!-- MAIN NAME -->
    <text x="60" y="255" font-family="'Bebas Neue', sans-serif" font-size="180" letter-spacing="6" fill="#faf3e3" opacity="0.97">YASH</text>
    <text x="60" y="410" font-family="'Bebas Neue', sans-serif" font-size="180" letter-spacing="6" fill="#e8a832">PATIL</text>
    <!-- Period accent -->
    <text x="710" y="410" font-family="'Bebas Neue', sans-serif" font-size="180" fill="rgba(42,191,179,0.7)">.</text>

    <!-- Role line -->
    <text x="62" y="455" font-family="'DM Mono', monospace" font-size="16" letter-spacing="4" fill="#8a7d65">FRONTEND DEVELOPER  ·  UI/UX DESIGNER  ·  PUNE, INDIA</text>

    <!-- Divider line -->
    <line x1="60" y1="476" x2="780" y2="476" stroke="rgba(232,168,50,0.18)" stroke-width="1"/>

    <!-- Skills row -->
    <!-- Pill 1 -->
    <rect x="60" y="494" width="110" height="26" rx="13" fill="rgba(232,168,50,0.08)" stroke="rgba(232,168,50,0.22)" stroke-width="1"/>
    <text x="115" y="511" font-family="'DM Mono', monospace" font-size="10" letter-spacing="2" fill="#e8a832" text-anchor="middle">THREE.JS</text>
    <!-- Pill 2 -->
    <rect x="182" y="494" width="110" height="26" rx="13" fill="rgba(232,168,50,0.08)" stroke="rgba(232,168,50,0.22)" stroke-width="1"/>
    <text x="237" y="511" font-family="'DM Mono', monospace" font-size="10" letter-spacing="2" fill="#e8a832" text-anchor="middle">REACT</text>
    <!-- Pill 3 -->
    <rect x="304" y="494" width="110" height="26" rx="13" fill="rgba(42,191,179,0.08)" stroke="rgba(42,191,179,0.22)" stroke-width="1"/>
    <text x="359" y="511" font-family="'DM Mono', monospace" font-size="10" letter-spacing="2" fill="#2abfb3" text-anchor="middle">AI / LLMs</text>
    <!-- Pill 4 -->
    <rect x="426" y="494" width="130" height="26" rx="13" fill="rgba(42,191,179,0.08)" stroke="rgba(42,191,179,0.22)" stroke-width="1"/>
    <text x="491" y="511" font-family="'DM Mono', monospace" font-size="10" letter-spacing="2" fill="#2abfb3" text-anchor="middle">UI/UX DESIGN</text>

    <!-- Right column: YP monogram -->
    <rect x="940" y="180" width="200" height="200" rx="100" fill="rgba(232,168,50,0.06)" stroke="rgba(232,168,50,0.15)" stroke-width="1"/>
    <text x="1040" y="316" font-family="'Bebas Neue', sans-serif" font-size="110" letter-spacing="4" fill="#e8a832" text-anchor="middle" opacity="0.9">YP</text>

    <!-- Available badge -->
    <rect x="900" y="420" width="240" height="36" rx="18" fill="rgba(42,191,179,0.1)" stroke="rgba(42,191,179,0.35)" stroke-width="1"/>
    <circle cx="924" cy="438" r="5" fill="#2abfb3"/>
    <text x="940" y="443" font-family="'DM Mono', monospace" font-size="12" letter-spacing="2" fill="#2abfb3">OPEN TO INTERNSHIPS</text>

    <!-- URL bottom right -->
    <text x="1140" y="600" font-family="'DM Mono', monospace" font-size="11" letter-spacing="2" fill="#8a7d65" text-anchor="end">yashpatil3495.github.io</text>

    <!-- Decorative dots -->
    <circle cx="1060" cy="560" r="2" fill="#e8a832" opacity="0.4"/>
    <circle cx="1075" cy="560" r="2" fill="#e8a832" opacity="0.25"/>
    <circle cx="1090" cy="560" r="2" fill="#e8a832" opacity="0.12"/>
  </g>
</svg>
</body>
</html>
