<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Lost in the Void | Yash Patil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0a06; --amber: #e8a832; --amber-dim: #c4892a;
    --text: #d4c9b0; --muted: #8a7d65; --rust: #c94a2a;
    --font-mono: 'DM Mono', monospace;
    --font-serif: 'Cormorant Garamond', serif;
    --font-display: 'Bebas Neue', sans-serif;
  }
  html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--font-serif); overflow:hidden; }
  #particles-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .grid-overlay {
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: linear-gradient(rgba(232,168,50,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(232,168,50,0.03) 1px,transparent 1px);
    background-size: 60px 60px;
  }
  .scanlines {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  }
  nav {
    position:fixed; top:0; left:0; right:0; padding:22px 40px;
    display:flex; align-items:center; justify-content:space-between; z-index:10;
    border-bottom:1px solid rgba(232,168,50,0.06);
    background:rgba(12,10,6,0.75); backdrop-filter:blur(12px);
  }
  .nav-logo { font-family:var(--font-display); font-size:1.4rem; letter-spacing:0.08em; color:var(--amber); text-decoration:none; }
  .nav-links-404 { display:flex; gap:32px; list-style:none; }
  .nav-links-404 a { font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); text-decoration:none; transition:color 0.2s; }
  .nav-links-404 a:hover { color:var(--amber); }
  .container {
    position:relative; z-index:5; height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:20px; text-align:center;
  }
  .four-o-four {
    font-family:var(--font-display);
    font-size: clamp(120px, 22vw, 260px);
    line-height:0.9; letter-spacing:0.04em; color:var(--amber);
    text-shadow: 0 0 80px rgba(232,168,50,0.4), 0 0 200px rgba(232,168,50,0.15);
    animation: glow-pulse 3s ease-in-out infinite;
    user-select:none; position:relative; margin-bottom:20px;
  }
  .four-o-four::after {
    content:'404'; position:absolute; inset:0;
    color:transparent; -webkit-text-stroke:1px rgba(232,168,50,0.12);
    transform:translate(3px,3px); z-index:-1;
  }
  @keyframes glow-pulse {
    0%,100% { text-shadow:0 0 80px rgba(232,168,50,0.4),0 0 200px rgba(232,168,50,0.15); }
    50%      { text-shadow:0 0 130px rgba(232,168,50,0.65),0 0 300px rgba(232,168,50,0.28); }
  }
  .error-badge {
    font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.2em; text-transform:uppercase;
    color:var(--rust); background:rgba(201,74,42,0.08); border:1px solid rgba(201,74,42,0.25);
    padding:5px 14px; border-radius:3px; margin-bottom:24px; display:inline-block;
  }
  h1 { font-family:var(--font-serif); font-size:clamp(26px,5vw,52px); font-weight:300; line-height:1.25; color:#f0e8d4; margin-bottom:14px; }
  h1 em { font-style:italic; color:var(--amber); }
  .subtitle { font-family:var(--font-mono); font-size:0.78rem; letter-spacing:0.05em; color:var(--muted); margin-bottom:44px; max-width:420px; line-height:1.75; }
  .cta-row { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:44px; }
  .btn-primary-404 {
    font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase;
    background:var(--amber); color:#0c0a06; padding:12px 28px; border-radius:6px;
    font-weight:700; text-decoration:none; transition:all 0.22s;
    box-shadow:0 0 24px rgba(232,168,50,0.3);
  }
  .btn-primary-404:hover { background:#f0ba40; box-shadow:0 0 40px rgba(232,168,50,0.55); transform:translateY(-2px); }
  .btn-ghost-404 {
    font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase;
    background:transparent; border:1px solid rgba(232,168,50,0.3);
    color:var(--amber); padding:12px 28px; border-radius:6px;
    font-weight:500; text-decoration:none; transition:all 0.22s;
  }
  .btn-ghost-404:hover { background:rgba(232,168,50,0.08); border-color:var(--amber); transform:translateY(-2px); }
  .quick-nav { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; border-top:1px solid rgba(232,168,50,0.08); padding-top:28px; }
  .quick-nav a {
    font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase;
    color:var(--muted); text-decoration:none; transition:color 0.2s; position:relative;
  }
  .quick-nav a::after {
    content:''; position:absolute; bottom:-2px; left:0; right:0; height:1px;
    background:var(--amber); transform:scaleX(0); transition:transform 0.22s; transform-origin:left;
  }
  .quick-nav a:hover { color:var(--amber); }
  .quick-nav a:hover::after { transform:scaleX(1); }
  .redirect-note {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase;
    color:rgba(138,125,101,0.5); z-index:10;
  }
  .redirect-note span { color:var(--muted); }
  @media (max-width:600px) {
    nav { padding:16px 20px; }
    .nav-links-404 { display:none; }
    h1 { font-size:26px; }
  }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanlines"></div>

<nav>
  <a href="/" class="nav-logo">YP</a>
  <ul class="nav-links-404">
    <li><a href="/#about">About</a></li>
    <li><a href="/#work">Work</a></li>
    <li><a href="/#contact">Contact</a></li>
    <li><a href="/resume.html" style="color:var(--amber);">Resume ↗</a></li>
  </ul>
</nav>

<div class="container">
  <div class="four-o-four" id="num-404">404</div>
  <div class="error-badge">Error 0x404 — Page not found</div>
  <h1>You've wandered off<br>the <em>map</em>.</h1>
  <p class="subtitle">The page you're looking for doesn't exist or has moved.<br>Let's get you back somewhere real.</p>
  <div class="cta-row">
    <a href="/" class="btn-primary-404">← Go Home</a>
    <a href="/#work" class="btn-ghost-404">View Projects</a>
  </div>
  <div class="quick-nav">
    <a href="/#about">About</a>
    <a href="/#education">Education</a>
    <a href="/#work">Projects</a>
    <a href="/#contact">Contact</a>
    <a href="/resume.html">Resume</a>
  </div>
</div>

<div class="redirect-note">Auto-redirecting in <span id="countdown">10</span>s</div>

<script>
/* PARTICLES */
(function(){
  const c=document.getElementById('particles-canvas'),ctx=c.getContext('2d');
  let W,H,P=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  function mk(){return{x:Math.random()*W,y:Math.random()*H,r:.5+Math.random()*1.5,vx:(Math.random()-.5)*.3,vy:-.2-Math.random()*.4,op:.1+Math.random()*.5,life:0,max:120+Math.random()*200};}
  for(let i=0;i<80;i++)P.push(mk());
  function draw(){
    ctx.clearRect(0,0,W,H);
    P.forEach((p,i)=>{
      p.x+=p.vx;p.y+=p.vy;p.life++;
      const f=p.life<30?p.life/30:p.life>p.max-30?(p.max-p.life)/30:1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(232,168,50,${p.op*f})`;ctx.fill();
      if(p.life>=p.max)P[i]=mk();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* GLITCH ANIMATION ON 404 */
(function(){
  const el=document.getElementById('num-404');if(!el)return;
  const chars='0123456789!@#$%^&*',target='404';let frame=0;
  function glitch(){
    if(frame<20){
      el.textContent=target.split('').map((c,i)=>frame>i*5?c:chars[Math.floor(Math.random()*chars.length)]).join('');
      frame++;requestAnimationFrame(glitch);
    } else { el.textContent='404'; }
  }
  setTimeout(glitch,400);
})();

/* COUNTDOWN */
(function(){
  let n=10;const el=document.getElementById('countdown');
  const t=setInterval(()=>{n--;if(el)el.textContent=n;if(n<=0){clearInterval(t);location.href='/';}},1000);
  ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{clearInterval(t);document.querySelector('.redirect-note')?.remove();},{once:true}));
})();
</script>
</body>
</html>
